<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AURA | Checkout</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="checkout.css">
</head>
<body>

<nav>
  <div class="nav-wrap">
    <h2 class="logo">AURA</h2>
    <ul>
      <li><a href="home.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="cart.html">Cart</a></li>
    </ul>
  </div>
</nav>

<section class="checkout-page">
  <h1>Checkout</h1>

  <div class="checkout-container">

    <form id="checkoutForm" class="checkout-form">
      <h2>Billing Details</h2>

      <input type="text" id="name" placeholder="Full Name">
      <input type="email" id="email" placeholder="Email Address">
      <input type="text" id="address" placeholder="Address">
      <input type="text" id="city" placeholder="City">
      <input type="text" id="zip" placeholder="ZIP Code">

      <button type="submit">Place Order</button>
    </form>

    <div class="order-summary">
      <h2>Order Summary</h2>
      <div id="orderItems"></div>
      <h3>Total: <span id="orderTotal">$0</span></h3>
    </div>

  </div>
</section>

<script src="checkout.js"></script>
</body>
</html>
